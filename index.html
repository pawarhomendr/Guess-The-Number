<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guess The Number - Professional Game</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #333;
            overflow-x: hidden;
        }
        nav {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
        }
        nav a {
            margin: 0 10px;
            padding: 12px 24px;
            border: 2px solid rgba(255,255,255,0.3);
            background: rgba(255,255,255,0.2);
            text-decoration: none;
            color: white;
            border-radius: 50px;
            font-weight: 500;
            -webkit-backdrop-filter: blur(10px);
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }
        nav a:hover {
            background: white;
            color: #667eea;
            transform: translateY(-2px);
        }
        #wrapper {
            background: rgba(255,255,255,0.95);
            -webkit-backdrop-filter: blur(20px);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            padding: 40px;
            max-width: 500px;
            width: 90%;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            animation: slideIn 0.8s ease-out;
        }
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(50px); }
            to { opacity: 1; transform: translateY(0); }
        }
        h1 {
            font-size: 2.5em;
            background: linear-gradient(45deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }
        p {
            color: #666;
            margin-bottom: 20px;
            font-weight: 300;
        }
        .form {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }
        label {
            font-size: 1.2em;
            font-weight: 600;
            color: #333;
        }
        #guessField {
            padding: 15px 20px;
            font-size: 1.5em;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            width: 200px;
            text-align: center;
            font-family: inherit;
            transition: all 0.3s ease;
        }
        #guessField:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 20px rgba(102, 126, 234, 0.3);
            transform: scale(1.02);
        }
        #subt {
            padding: 15px 40px;
            background: linear-gradient(45deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 50px;
            font-size: 1.1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        #subt:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }
        #subt:active {
            transform: translateY(-1px);
        }
        .resultParas {
            margin-top: 30px;
        }
        .resultParas p {
            font-size: 1.1em;
            margin: 15px 0;
            font-weight: 500;
        }
        .lowOrHi {
            min-height: 40px;
        }
        .lowOrHi.error {
            color: #e74c3c;
            animation: shake 0.5s ease-in-out;
        }
        .lowOrHi.success {
            color: #27ae60;
            font-size: 1.3em;
            animation: celebrate 0.6s ease-in-out infinite;
        }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }
        @keyframes celebrate {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        .progress-bar {
            width: 100%;
            height: 10px;
            background: #e0e0e0;
            border-radius: 5px;
            margin: 20px 0;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            width: 100%;
            transition: width 0.3s ease;
        }
        #newGame {
            background: linear-gradient(45deg, #27ae60, #2ecc71);
            color: white;
            padding: 15px 40px;
            border: none;
            border-radius: 50px;
            font-size: 1.1em;
            font-weight: 600;
            cursor: pointer;
            margin-top: 20px;
            transition: all 0.3s ease;
        }
        #newGame:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(39, 174, 96, 0.4);
        }
        .high-score {
            background: rgba(255,193,7,0.2);
            border: 2px solid #ffc107;
            border-radius: 10px;
            padding: 10px;
            margin: 10px 0;
        }
        @media (max-width: 600px) {
            #wrapper {
                margin: 80px 20px 20px;
                padding: 30px 20px;
            }
            h1 { font-size: 2em; }
            #guessField { width: 180px; font-size: 1.3em; }
        }
        .confetti {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1000;
        }
    </style>
</head>
<body>
    <nav>
        <a href="/">Home</a>
        <a href="https://www.youtube.com/@EktaMore" target="_blank" rel="noopener">YT Channel</a>
    </nav>
    <div id="wrapper">
        <h1>🎯 Guess The Number</h1>
        <p>Can you guess the number between <strong>1 and 100</strong>?</p>
        <p>You have <strong id="maxAttempts">10</strong> attempts. Good luck!</p>
        
        <div class="progress-bar">
            <div class="progress-fill" id="progressFill" style="width: 100%;"></div>
        </div>
        
        <form class="form" id="guessForm">
            <label for="guessField">Your Guess:</label>
            <input type="number" id="guessField" class="guessField" min="1" max="100" placeholder="1-100" aria-label="Enter your guess">
            <input type="submit" id="subt" value="🔥 Submit Guess">
        </form>

        <div class="resultParas">
            <p>Previous Guesses: <span class="guesses"></span></p>
            <p>Attempts Remaining: <span class="lastResult">10</span></p>
            <p>High Score (Attempts): <span class="highScore">0</span></p>
            <div class="high-score" id="highScoreDisplay" style="display: none;">🎉 New High Score!</div>
            <p class="lowOrHi" id="lowOrHi"></p>
        </div>
    </div>
    
    <script src="Homee.js"></script>
</body>
</html>
